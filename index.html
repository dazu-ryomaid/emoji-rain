<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pluie d'Emojis</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  }
  #canvas-container {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
  }
  #welcome {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    pointer-events: none;
    text-align: center;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,.3), 0 2px 8px rgba(0,0,0,.5);
    width: 90%; max-width: 600px;
  }
  #welcome h1 {
    font-size: clamp(1.5rem, 5vw, 3rem);
    font-weight: 600;
    letter-spacing: .02em;
    background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: .5rem;
  }
  #welcome p {
    font-size: clamp(.9rem, 2.5vw, 1.2rem);
    opacity: .7;
  }
  #tap-hint {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,.35);
    font-size: .85rem;
    z-index: 10;
    pointer-events: none;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }
  #fps-counter {
    position: fixed;
    top: .5rem; left: .5rem;
    color: rgba(255,255,255,.4);
    font-size: .7rem;
    font-family: monospace;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="welcome">
  <h1>вңҰ bienvenue вңҰ</h1>
  <p>sur ce site de test</p>
</div>
<p id="tap-hint">tape / clique pour une rafale</p>
<div id="fps-counter">-- FPS</div>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;

// в”Җв”Җ Emoji pools organised by Unicode category в”Җв”Җ
const EMOJI_POOLS = {
  // U+2600вҖ“U+26FF  Miscellaneous Symbols (weather, signs)
  signs:       ['вҳҖпёҸ','вҳҒпёҸ','вӣҲпёҸ','рҹҢӨпёҸ','вҡЎ','вҳ„пёҸ','рҹ”Ҙ','рҹ’§','рҹҢҠ','вҳӮпёҸ','вқ„пёҸ','вҳғпёҸ','вӯҗ','вҳҳпёҸ','вҡ”пёҸ','вҡҷпёҸ','вҳ•','вҡЎ'],
  // U+2700вҖ“U+27BF  Dingbats (stars, crosses, symbols)
  dingbats:    ['вңӮпёҸ','вң…','вңүпёҸ','вңҢпёҸ','вңҚпёҸ','вңЁ','вқҢ','вқ“','вқ—','вһ•','вһ–','вһ—','вһ°','вң”пёҸ','вң–пёҸ','вңіпёҸ','вңҙпёҸ','вқҮпёҸ'],
  // U+1F300вҖ“U+1F5FF  Misc Symbols & Pictographs (weather, objects)
  pictographs: ['рҹҢҲ','рҹҢҚ','рҹҢҺ','рҹҢҸ','рҹҢ‘','рҹҢ’','рҹҢ“','рҹҢ”','рҹҢ•','рҹҢҹ','рҹҢҷ','рҹҢё','рҹҢә','рҹҢ»','рҹҢј','рҹҢ·','рҹҚҖ','рҹҚҒ','рҹҚӮ','рҹҚғ','рҹҚ„','рҹҢҝ','рҹҢө','рҹҺ„','рҹҺү','рҹҺҠ','рҹҺҲ','рҹҺҒ','рҹҺҖ','рҹҺІ','рҹҺҜ','рҹҺ®','рҹҺЁ','рҹҺӯ','рҹҺӘ','рҹҺө','рҹҺ¶','рҹҺё','рҹҺә','рҹҺ»','рҹҺј','рҹҸҶ','рҹҸ”пёҸ','рҹҸ–пёҸ','рҹҸ—пёҸ','рҹҸӣпёҸ','рҹӣ пёҸ','рҹӣЎпёҸ','рҹ”®','рҹ’Һ','рҹ’Ў','рҹ’»','рҹ“ұ','рҹ“Ў','рҹ“ҡ','рҹ”¬','рҹ”ӯ','рҹ”§','рҹ”Ё','рҹ•№пёҸ','рҹ–ҘпёҸ','рҹ—ҝ','рҹӘҗ'],
  // U+1F600вҖ“U+1F64F  Emoticons (faces)
  emoticons:   ['рҹҳҠ','рҹҳҺ','рҹӨ”','рҹӨ—','рҹӨ©','рҹҳҢ','рҹҳҸ','рҹҳҙ','рҹӨҜ','рҹҘі','рҹҳҲ','рҹ‘»','рҹ’Җ','вҳ пёҸ','рҹҺғ','рҹӨ–'],
  // U+1F680вҖ“U+1F6FF  Transport & Map
  transport:   ['рҹҡҖ','рҹҡҒ','вңҲпёҸ','рҹҡӮ','рҹҡІ','рҹӣҙ','рҹҡҰ','рҹҡ§','вӣҪ','рҹӣё','рҹҢҢ','рҹ—әпёҸ','рҹ§ӯ','рҹҡҖ','рҹӣ°пёҸ'],
  // U+1F900вҖ“U+1F9FF  Supplemental Symbols (activities, body)
  supplemental: ['рҹ§ ','рҹ«Җ','рҹ«Ғ','рҹҰӢ','рҹҰ„','рҹҗҡ','рҹ§©','рҹ§Ә','рҹ§¬','рҹӣҢ','рҹ§ҳ','рҹҰҰ','рҹ«җ','рҹ§Ҡ'],
  // U+1FA00вҖ“U+1FA6F  Chess Symbols
  chess:       ['рҹ©°','рҹӘ„','рҹӘ…','рҹӘҶ','рҹӘҗ','рҹӘЁ','рҹӘө','рҹӘ¶','рҹӘ·'],
  // U+2B50вҖ“U+2B55  Stars & ratings
  stars:       ['вӯҗ','рҹҢҹ','вңЁ','рҹ’«','вҡЎ'],
};

// Flatten into a single array for quick random picks
const ALL_EMOJIS = Object.values(EMOJI_POOLS).flat();

function randomEmoji() {
  return ALL_EMOJIS[Math.floor(Math.random() * ALL_EMOJIS.length)];
}

// в”Җв”Җ Physics constants в”Җв”Җ
const MAX_PARTICLES  = 600;
const MAX_FALLING    = 50;     // max actively-falling particles
const FLOOR_RATIO    = 0.92;   // floor at 92% from top
const PILE_CAP_RATIO = 0.55;   // pile can stack no higher than 55% from top
const SPAWN_INTERVAL = 0.04;   // seconds between each spawn
const DRIFT_AMP      = 25;
const DRIFT_FREQ     = 0.35;

// в”Җв”Җ Pile grid: tracks the top surface of settled emojis в”Җв”Җ
let cellSize, cells;

function initPileGrid() {
  cellSize = 20;
  const n = Math.ceil(W / cellSize) + 1;
  cells = new Float32Array(n).fill(Infinity);
}

function getPileTop(x) {
  let idx = Math.floor(x / cellSize);
  if (idx < 0) idx = 0;
  if (idx >= cells.length) idx = cells.length - 1;
  return cells[idx];
}

function setPileTop(x, y) {
  const idx = Math.floor(x / cellSize);
  if (idx < 0 || idx >= cells.length) return;
  if (y < cells[idx]) cells[idx] = y;
}

// в”Җв”Җ Floor glow gradient вҖ” pre-built in resize(), not per frame в”Җв”Җ
let floorGradient = null;

function buildFloorGradient() {
  const floorY = H * FLOOR_RATIO;
  floorGradient = ctx.createLinearGradient(0, floorY - 30, 0, floorY + 10);
  floorGradient.addColorStop(0, 'rgba(255,255,255,0)');
  floorGradient.addColorStop(0.7, 'rgba(255,255,255,0.03)');
  floorGradient.addColorStop(1, 'rgba(160,120,255,0.06)');
}

// в”Җв”Җ Emoji particle в”Җв”Җ
class EmojiParticle {
  constructor(x, startY) {
    this.emoji    = randomEmoji();
    this.x        = x ?? Math.random() * W;
    this.y        = startY ?? (-60 - Math.random() * 120);
    this.vy       = 0;
    this.gravity  = 90 + Math.random() * 80;
    this.size     = 18 + Math.random() * 18;
    this.baseSize = this.size;
    this.fontStr  = `${Math.round(this.size)}px serif`;
    this.driftOffset = Math.random() * Math.PI * 2;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.8;
    this.opacity  = 0.85 + Math.random() * 0.15;
    this.settled  = false;
    this.ghosting = false; // fading pass-through when pile is at cap
  }

  get bottom() { return this.y + this.size * 0.5; }

  update(dt) {
    if (this.settled) return;

    // Ghosting mode: pile was at cap вҖ” fade and fall through
    if (this.ghosting) {
      this.opacity = Math.max(0, this.opacity - dt * 2);
      this.vy += this.gravity * dt;
      this.y  += this.vy * dt;
      return;
    }

    // Gravity + drift
    this.vy += this.gravity * dt;
    this.y  += this.vy * dt;
    this.x  += Math.sin(this.driftOffset + this.y * DRIFT_FREQ * 0.01) * DRIFT_AMP * dt;
    this.rotation += this.rotSpeed * dt;

    // в”Җв”Җ Collision check в”Җв”Җ
    const floorY  = H * FLOOR_RATIO;
    const pileTop = getPileTop(this.x);
    const surface = Math.min(floorY, pileTop);
    const capY    = H * PILE_CAP_RATIO;

    if (this.bottom >= surface) {
      // Pile is at cap: ghost instead of stacking further
      if (pileTop <= capY + 1) {
        this.ghosting = true;
        return;
      }
      this.settle(surface);
      return;
    }

    // Squash/bounce when close to surface
    if (this.bottom >= surface - 15 && this.vy > 150) {
      this.vy *= -0.12;
      this.y = surface - this.size * 0.5 - 3;
      this.size = this.baseSize * 0.9;
      this.fontStr = `${Math.round(this.size)}px serif`;
    }
  }

  settle(y) {
    this.settled = true;
    this.size = this.baseSize * (0.85 + Math.random() * 0.15);
    this.fontStr = `${Math.round(this.size)}px serif`;
    const finalBottom = Math.max(y, H * PILE_CAP_RATIO + this.size);
    this.y = finalBottom - this.size * 0.5;
    setPileTop(this.x, finalBottom - this.size);
  }

  // No save/restore: alpha direct, transform reset with setTransform
  draw(drawCtx = ctx) {
    drawCtx.globalAlpha = this.ghosting
      ? this.opacity * 0.5
      : (this.settled ? 0.88 : this.opacity);
    drawCtx.font = this.fontStr;
    drawCtx.translate(this.x, this.y);
    drawCtx.rotate(this.rotation);
    drawCtx.fillText(this.emoji, 0, 0);
    drawCtx.setTransform(1, 0, 0, 1, 0, 0);
  }
}

// в”Җв”Җ State в”Җв”Җ
let particles = [];
let spawnTimer = 0;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;
  initPileGrid();
  buildFloorGradient();
}
resize();
window.addEventListener('resize', resize);

// в”Җв”Җ Spawn helpers в”Җв”Җ
function spawnRaindrop() {
  if (particles.length >= MAX_PARTICLES) return;
  const falling = particles.filter(p => !p.settled && !p.ghosting).length;
  if (falling >= MAX_FALLING) return;
  // Avoid dropping directly over the center text (bounded loop)
  const minClear = W * 0.12;
  let x = Math.random() * W;
  for (let i = 0; i < 10; i++) {
    x = Math.random() * W;
    if (Math.abs(x - W / 2) >= minClear) break;
  }
  particles.push(new EmojiParticle(x));
}

function spawnBurst(cx, cy, count, spread) {
  spread = spread ?? 60;
  for (let i = 0; i < count; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    const x = cx + (Math.random() - 0.5) * spread;
    const p = new EmojiParticle(x, cy);
    p.vy = -350 - Math.random() * 150;
    p.gravity = 400 + Math.random() * 200;
    particles.push(p);
  }
}

// в”Җв”Җ FPS counter в”Җв”Җ
const fpsEl = document.getElementById('fps-counter');
let fpsCount = 0, fpsAccum = 0;

// в”Җв”Җ Main loop в”Җв”Җ
let lastTime = 0;

function loop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  // FPS display
  fpsCount++;
  fpsAccum += dt;
  if (fpsAccum >= 1) {
    fpsEl.textContent = `${fpsCount} FPS`;
    fpsCount = 0;
    fpsAccum = 0;
  }

  // Continuous gentle rain
  if (particles.length < MAX_PARTICLES) {
    spawnTimer += dt;
    while (spawnTimer >= SPAWN_INTERVAL) {
      spawnTimer -= SPAWN_INTERVAL;
      spawnRaindrop();
    }
  }

  // Update all particles
  for (const p of particles) p.update(dt);

  // Remove fully-faded ghosting particles
  particles = particles.filter(p => !(p.ghosting && p.opacity <= 0));

  // в”Җв”Җ Draw: 3 linear passes вҖ” falling вҶ’ settled вҶ’ ghosting в”Җв”Җ
  ctx.clearRect(0, 0, W, H);
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  // Pass 1: falling
  for (const p of particles) {
    if (!p.settled && !p.ghosting) p.draw();
  }

  // Pass 2: settled (drawn over falling, so pile appears solid)
  for (const p of particles) {
    if (p.settled) p.draw();
  }

  // Pass 3: ghosting (on top of everything, fading through)
  for (const p of particles) {
    if (p.ghosting) p.draw();
  }

  // Reset alpha after particle passes
  ctx.globalAlpha = 1;

  // Floor glow overlay
  if (floorGradient) {
    ctx.fillStyle = floorGradient;
    ctx.fillRect(0, H * FLOOR_RATIO - 30, W, 40);
  }

  requestAnimationFrame(loop);
}

// в”Җв”Җ Interactions в”Җв”Җ
canvas.addEventListener('click', (e) => {
  spawnBurst(e.clientX, e.clientY, 30, 60);
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  spawnBurst(t.clientX, t.clientY, 25, 80);
});

document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Space') {
    e.preventDefault();
    for (let i = 0; i < 40; i++) spawnRaindrop();
  }
});

// Go!
requestAnimationFrame(loop);
</script>
</body>
</html>
