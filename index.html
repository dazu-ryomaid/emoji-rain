<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pluie d'Emojis</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  }
  #canvas-container {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
  }
  #welcome {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    pointer-events: none;
    text-align: center;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,.3), 0 2px 8px rgba(0,0,0,.5);
    width: 90%; max-width: 600px;
  }
  #welcome h1 {
    font-size: clamp(1.5rem, 5vw, 3rem);
    font-weight: 600;
    letter-spacing: .02em;
    background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: .5rem;
  }
  #welcome p {
    font-size: clamp(.9rem, 2.5vw, 1.2rem);
    opacity: .7;
  }
  /* touch feedback */
  #tap-hint {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,.35);
    font-size: .85rem;
    z-index: 10;
    pointer-events: none;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }
</style>
</head>
<body>

<div id="welcome">
  <h1>✦ bienvenue ✦</h1>
  <p>sur ce site de test</p>
</div>
<p id="tap-hint">tape / clique pour une rafale</p>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
const emojis = ['🌟','✨','⭐','💫','🌈','🎉','🎊','💜','🖤','🌸','🍀','🎵','🎶','💻','⚡','🔥','💧','🍃','🦋','💎','🎲','🎯','🎮','🕹️','🚀','🔮','💡','🎪','🎭','🎨','🎼','🏔️','🌊','🌌','💫','⭐','🌙','🌺','🍄','🌿','🐚','🪐','💙','🤍','💗','🌷'];

// === EMOJI RAIN ENGINE ===
class EmojiParticle {
  constructor() {
    this.reset();
  }
  reset(x) {
    this.emoji  = emojis[Math.floor(Math.random() * emojis.length)];
    this.x      = x ?? Math.random() * W;
    this.y      = -60 - Math.random() * 120;
    // Physique de base
    this.vy     = 0;
    this.gravity = 90 + Math.random() * 80;  // px/s²
    // Taille
    this.size   = 18 + Math.random() * 18;    // 18–36px
    this.baseSize = this.size;
    // Oscillation latérale (vent léger)
    this.driftAmp = 20 + Math.random() * 40;
    this.driftFreq = 0.3 + Math.random() * 0.4;
    this.driftOffset = Math.random() * Math.PI * 2;
    // Rotation
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.8;
    // Opacité/squash
    this.opacity  = 0.9 + Math.random() * 0.1;
    this.settled = false;
    this.settleY = 0;
    this.settleX = 0;
  }

  update(dt, piles) {
    if (this.settled) return;

    // Gravité
    this.vy += this.gravity * dt;
    this.y  += this.vy * dt;

    // Dérive latérale sinusoïdale
    this.x += Math.sin(this.driftOffset + this.y * this.driftFreq * 0.01) * this.driftAmp * dt;
    this.rotation += this.rotSpeed * dt;

    // Vérifier si on touche le sol ou une pile
    const px = this.x;
    const py = this.y + this.size * 0.5; // bas de l'emoji

    // Limite de sol = ligne de pile max → 45% de la hauteur
    const maxPileH = H * 0.45;

    // Chercher la pile la plus haute à cette position x
    let pileH = 0; // hauteur de pile en ce point
    for (const p of piles) {
      if (Math.abs(p.x - px) < p.size * 0.6) {
        // Sur une pile existante, prendre le haut de pile
        if (p.settleY > pileH) pileH = p.settleY;
      }
    }

    // Condition d'arrêt : atteint le sol ou une pile
    if (py >= maxPileH - pileH) {
      this.settled = true;
      this.settleY = py;
      this.settleX = this.x;
      // Légère compression visuelle
      this.size = this.baseSize * (0.85 + Math.random() * 0.15);
      return;
    }

    // Rebond / squash quand on approche du sol
    if (py >= maxPileH - pileH - 20 && this.vy > 200) {
      // Petit ralentissement au sol
      this.vy *= -0.15;
      this.y = maxPileH - pileH - this.size * 0.5 - 5;
      this.size = this.baseSize * 0.9;
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.settled ? 0.85 : this.opacity;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    const s = this.size / 36; // échelle relative
    ctx.font = `${this.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.emoji, 0, 0);
    ctx.restore();
  }
}

// === SETUP ===
let particles = [];
const MAX_PARTICLES = 350;
const FLOOR_RATIO = 0.45; // la pile monte jusqu'à 45% de l'écran
let spawnTimer = 0;
const SPAWN_INTERVAL = 0.04; // secondes entre chaque goutte
let lastSpawnX = 0;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  // Redessiner
}
resize();
window.addEventListener('resize', resize);

function getPiles() {
  return particles.filter(p => p.settled);
}

function spawnBurst(count) {
  for (let i = 0; i < count; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    const p = new EmojiParticle();
    // Répartir les x uniformément mais avec un peu d'aléa
    p.x = (i / count) * W * 0.9 + W * 0.05 + (Math.random() - 0.5) * W * 0.1;
    particles.push(p);
  }
}

let burstTimer = 0;
let burstRemaining = 0;

// === GAME LOOP ===
let lastTime = 0;
function loop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  // Spawn continu (pluie douce)
  if (particles.length < MAX_PARTICLES) {
    spawnTimer += dt;
    if (spawnTimer >= SPAWN_INTERVAL) {
      spawnTimer = 0;
      const p = new EmojiParticle();
      // Distribution aléatoire, mais éviter le centre (texte)
      let x;
      do {
        x = Math.random() * W;
      } while (Math.abs(x - W/2) < W * 0.12); // zone de protection au centre
      p.x = x;
      particles.push(p);
    }
  }

  // Burst au clic/tap
  if (burstRemaining > 0) {
    burstTimer += dt;
    if (burstTimer >= 0.015) {
      burstTimer = 0;
      const p = new EmojiParticle();
      p.x = Math.random() * W;
      p.vy = -200 - Math.random() * 100; // burst monte d'abord
      particles.push(p);
      burstRemaining--;
    }
  }

  // Update toutes les particules
  const piles = getPiles();
  for (const p of particles) {
    p.update(dt, piles);
  }

  // Draw
  ctx.clearRect(0, 0, W, H);

  // Ligne de sol invisible (pour debug visuel, on dessine un gradient subtil)
  const floorY = H * FLOOR_RATIO;
  const grad = ctx.createLinearGradient(0, floorY - 40, 0, floorY);
  grad.addColorStop(0, 'rgba(255,255,255,0)');
  grad.addColorStop(1, 'rgba(255,255,255,0.04)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, floorY - 40, W, 40);

  // Dessiner les particules du fond vers le devant (par y)
  const sorted = [...particles].sort((a, b) => a.y - b.y);
  for (const p of sorted) {
    p.draw(ctx);
  }

  requestAnimationFrame(loop);
}

// === INTERACTIONS ===
canvas.addEventListener('click', (e) => {
  // Burst de 30 emojis à l'endroit du clic, qui montent puis retombent
  for (let i = 0; i < 30; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    const p = new EmojiParticle(e.clientX + (Math.random() - 0.5) * 60);
    p.y = e.clientY;
    p.vy = -350 - Math.random() * 150;
    p.gravity = 400 + Math.random() * 200;
    particles.push(p);
  }
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  for (let i = 0; i < 25; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    const p = new EmojiParticle(touch.clientX + (Math.random() - 0.5) * 80);
    p.y = touch.clientY;
    p.vy = -350 - Math.random() * 150;
    p.gravity = 400 + Math.random() * 200;
    particles.push(p);
  }
});

// Clavier
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Space') {
    e.preventDefault();
    burstRemaining = 40;
    burstTimer = 999;
  }
});

// Démarrage
requestAnimationFrame(loop);
</script>
</body>
</html>
