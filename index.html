<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pluie d'Emojis</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  }
  #canvas-container {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
  }
  #welcome {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    pointer-events: none;
    text-align: center;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,.3), 0 2px 8px rgba(0,0,0,.5);
    width: 90%; max-width: 600px;
  }
  #welcome h1 {
    font-size: clamp(1.5rem, 5vw, 3rem);
    font-weight: 600;
    letter-spacing: .02em;
    background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: .5rem;
  }
  #welcome p {
    font-size: clamp(.9rem, 2.5vw, 1.2rem);
    opacity: .7;
  }
  #tap-hint {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,.35);
    font-size: .85rem;
    z-index: 10;
    pointer-events: none;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }
  #fps-counter {
    position: fixed;
    top: .5rem; left: .5rem;
    color: rgba(255,255,255,.4);
    font-size: .7rem;
    font-family: monospace;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="welcome">
  <h1>✦ bienvenue ✦</h1>
  <p>sur ce site de test</p>
</div>
<p id="tap-hint">tape / clique pour une rafale</p>
<div id="fps-counter">-- FPS</div>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;

// ── Emoji pools organised by Unicode category ──
// Each group corresponds to a real Unicode emoji block.
// We still curate because many codepoints in these ranges
// are modifiers, ZWJ sequences, or unassigned.
const EMOJI_POOLS = {
  // U+2600–U+26FF  Miscellaneous Symbols (weather, signs)
  signs:       ['☀️','☁️','⛈️','🌤️','⚡','☄️','🔥','💧','🌊','☂️','❄️','☃️','⭐','☘️','⚔️','⚙️','☕','⚡'],
  // U+2700–U+27BF  Dingbats (stars, crosses, symbols)
  dingbats:    ['✂️','✅','✉️','✌️','✍️','✨','❌','❓','❗','➕','➖','➗','➰','✔️','✖️','✳️','✴️','❇️'],
  // U+1F300–U+1F5FF  Misc Symbols & Pictographs (weather, objects)
  pictographs: ['🌈','🌍','🌎','🌏','🌑','🌒','🌓','🌔','🌕','🌟','🌙','🌸','🌺','🌻','🌼','🌷','🍀','🍁','🍂','🍃','🍄','🌿','🌵','🎄','🎉','🎊','🎈','🎁','🎀','🎲','🎯','🎮','🎨','🎭','🎪','🎵','🎶','🎸','🎺','🎻','🎼','🏆','🏔️','🏖️','🏗️','🏛️','🛠️','🛡️','🔮','💎','💡','💻','📱','📡','📚','🔬','🔭','🔧','🔨','🕹️','🖥️','🗿','🪐'],
  // U+1F600–U+1F64F  Emoticons (faces)
  emoticons:   ['😊','😎','🤔','🤗','🤩','😌','😏','😴','🤯','🥳','😈','👻','💀','☠️','🎃','🤖'],
  // U+1F680–U+1F6FF  Transport & Map
  transport:   ['🚀','🚁','✈️','🚂','🚲','🛴','🚦','🚧','⛽','🛸','🌌','🗺️','🧭','🚀','🛰️'],
  // U+1F900–U+1F9FF  Supplemental Symbols (activities, body)
  supplemental: ['🧠','🫀','🫁','🦋','🦄','🐚','🧩','🧪','🧬','🛌','🧘','🦦','🫐','🧊'],
  // U+1FA00–U+1FA6F  Chess Symbols
  chess:       ['🩰','🪄','🪅','🪆','🪐','🪨','🪵','🪶','🪷'],
  // U+2B50–U+2B55  Stars & ratings
  stars:       ['⭐','🌟','✨','💫','⚡'],
};

// Flatten into a single array for quick random picks
const ALL_EMOJIS = Object.values(EMOJI_POOLS).flat();

function randomEmoji() {
  return ALL_EMOJIS[Math.floor(Math.random() * ALL_EMOJIS.length)];
}

// ── Physics constants ──
const MAX_PARTICLES  = 400;
const FLOOR_RATIO    = 0.92;   // floor at 92% from top (near bottom)
const PILE_CAP_RATIO = 0.55;   // pile can stack no higher than 55% from top
const SPAWN_INTERVAL = 0.04;   // seconds between each spawn
const DRIFT_AMP      = 25;
const DRIFT_FREQ     = 0.35;

// ── Pile grid: tracks the top surface of settled emojis ──
let cellSize, cells;

function initPileGrid() {
  cellSize = 20;
  const n = Math.ceil(W / cellSize) + 1;
  cells = new Float32Array(n).fill(Infinity);
}

// FIX: was `const idx` causing TypeError on reassignment
function getPileTop(x) {
  let idx = Math.floor(x / cellSize);
  if (idx < 0) idx = 0;
  if (idx >= cells.length) idx = cells.length - 1;
  return cells[idx];
}

function setPileTop(x, y) {
  const idx = Math.floor(x / cellSize);
  if (idx < 0 || idx >= cells.length) return;
  if (y < cells[idx]) cells[idx] = y;
}

// ── Floor glow gradient — pre-built in resize(), not per frame ──
let floorGradient = null;

function buildFloorGradient() {
  const floorY = H * FLOOR_RATIO;
  floorGradient = ctx.createLinearGradient(0, floorY - 30, 0, floorY + 10);
  floorGradient.addColorStop(0, 'rgba(255,255,255,0)');
  floorGradient.addColorStop(0.7, 'rgba(255,255,255,0.03)');
  floorGradient.addColorStop(1, 'rgba(160,120,255,0.06)');
}

// ── Emoji particle ──
class EmojiParticle {
  constructor(x, startY) {
    this.emoji    = randomEmoji();
    this.x        = x ?? Math.random() * W;
    this.y        = startY ?? (-60 - Math.random() * 120);
    this.vy       = 0;
    this.gravity  = 90 + Math.random() * 80;
    this.size     = 18 + Math.random() * 18;
    this.baseSize = this.size;
    this.fontStr  = `${Math.round(this.size)}px serif`; // cached, avoids string concat per frame
    this.driftOffset = Math.random() * Math.PI * 2;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.8;
    this.opacity  = 0.85 + Math.random() * 0.15;
    this.settled  = false;
    this.ghosting = false; // fading pass-through when pile is at cap
  }

  get bottom() { return this.y + this.size * 0.5; }

  update(dt) {
    if (this.settled) return;

    // Ghosting mode: pile was at cap — fade and fall through
    if (this.ghosting) {
      this.opacity = Math.max(0, this.opacity - dt * 2);
      this.vy += this.gravity * dt;
      this.y  += this.vy * dt;
      return;
    }

    // Gravity
    this.vy += this.gravity * dt;
    this.y  += this.vy * dt;

    // Gentle horizontal drift (wind)
    this.x += Math.sin(this.driftOffset + this.y * DRIFT_FREQ * 0.01) * DRIFT_AMP * dt;

    // Rotation during fall
    this.rotation += this.rotSpeed * dt;

    // ── Collision check ──
    const floorY  = H * FLOOR_RATIO;
    const pileTop = getPileTop(this.x);
    const surface = Math.min(floorY, pileTop);
    const capY    = H * PILE_CAP_RATIO;

    if (this.bottom >= surface) {
      // Pile is at cap: ghost instead of stacking further
      if (pileTop <= capY + 1) {
        this.ghosting = true;
        return;
      }
      this.settle(surface);
      return;
    }

    // Squash/bounce when close to surface
    if (this.bottom >= surface - 15 && this.vy > 150) {
      this.vy *= -0.12;
      this.y = surface - this.size * 0.5 - 3;
      this.size = this.baseSize * 0.9;
      this.fontStr = `${Math.round(this.size)}px serif`; // sync cache
    }
  }

  settle(y) {
    this.settled = true;
    const finalY = Math.max(y, H * PILE_CAP_RATIO);
    this.y = finalY;
    this.size = this.baseSize * (0.85 + Math.random() * 0.15);
    this.fontStr = `${Math.round(this.size)}px serif`; // sync cache
    setPileTop(this.x, finalY);
  }

  // No save/restore: set alpha directly, reset transform with setTransform
  draw() {
    ctx.globalAlpha = this.ghosting ? this.opacity * 0.5 : (this.settled ? 0.88 : this.opacity);
    ctx.font = this.fontStr;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.fillText(this.emoji, 0, 0);
    ctx.setTransform(1, 0, 0, 1, 0, 0); // reset without push/pop overhead
  }
}

// ── State ──
let particles = [];
let spawnTimer = 0;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;
  initPileGrid();
  buildFloorGradient();
}
resize();
window.addEventListener('resize', resize);

// ── Spawn helpers ──
function spawnRaindrop() {
  if (particles.length >= MAX_PARTICLES) return;
  // Avoid dropping directly over the center text
  // Bounded loop (was do-while — could spin forever on narrow screens)
  const minClear = W * 0.12;
  let x = Math.random() * W;
  for (let i = 0; i < 10; i++) {
    x = Math.random() * W;
    if (Math.abs(x - W / 2) >= minClear) break;
  }
  particles.push(new EmojiParticle(x));
}

function spawnBurst(cx, cy, count, spread) {
  spread = spread ?? 60;
  for (let i = 0; i < count; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    const x = cx + (Math.random() - 0.5) * spread;
    const p = new EmojiParticle(x, cy);
    p.vy = -350 - Math.random() * 150;  // burst upward
    p.gravity = 400 + Math.random() * 200;
    particles.push(p);
  }
}

// ── FPS counter ──
const fpsEl = document.getElementById('fps-counter');
let fpsCount = 0, fpsAccum = 0;

// ── Main loop ──
let lastTime = 0;

function loop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  // FPS display
  fpsCount++;
  fpsAccum += dt;
  if (fpsAccum >= 1) {
    fpsEl.textContent = `${fpsCount} FPS`;
    fpsCount = 0;
    fpsAccum = 0;
  }

  // Continuous gentle rain
  if (particles.length < MAX_PARTICLES) {
    spawnTimer += dt;
    while (spawnTimer >= SPAWN_INTERVAL) {
      spawnTimer -= SPAWN_INTERVAL;
      spawnRaindrop();
    }
  }

  // Update all
  for (const p of particles) p.update(dt);

  // Remove fully-faded ghosting particles
  particles = particles.filter(p => !(p.ghosting && p.opacity <= 0));

  // Draw
  ctx.clearRect(0, 0, W, H);

  // Floor glow (pre-built gradient, no per-frame creation)
  const floorY = H * FLOOR_RATIO;
  ctx.fillStyle = floorGradient;
  ctx.fillRect(0, floorY - 30, W, 40);

  // Painter's algorithm — 3 linear passes, no sort (O(n) vs O(n log n))
  // Set shared state once outside the loops
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  // Pass 1: falling emojis (behind the pile)
  for (const p of particles) {
    if (!p.settled && !p.ghosting) p.draw();
  }
  // Pass 2: settled pile (on top of falling)
  for (const p of particles) {
    if (p.settled) p.draw();
  }
  // Pass 3: ghosting (passing through the pile, on top)
  for (const p of particles) {
    if (p.ghosting) p.draw();
  }

  ctx.globalAlpha = 1; // restore after ghosting draws

  requestAnimationFrame(loop);
}

// ── Interactions ──
canvas.addEventListener('click', (e) => {
  spawnBurst(e.clientX, e.clientY, 30, 60);
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  spawnBurst(t.clientX, t.clientY, 25, 80);
});

document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Space') {
    e.preventDefault();
    // Burst from above
    for (let i = 0; i < 40; i++) spawnRaindrop();
  }
});

// Go!
requestAnimationFrame(loop);
</script>
</body>
</html>
